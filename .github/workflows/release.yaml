name: Publish Gadget
on:
  push:
    tags:
      - 'v*'

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install Cosign
        uses: sigstore/cosign-installer@v4.1.1

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push Gadget
        run: |
          make push

      - name: Sign the published Gadget image
        env:
          COSIGN_PRIVATE_KEY: ${{ secrets.COSIGN_PRIVATE_KEY }}
          COSIGN_PASSWORD: ${{ secrets.COSIGN_PASSWORD }}
        run: |
          digest=$(tar -xOf build/image.tar index.json | jq -er '.mediaType as $mediaType| .manifests | map(select(.mediaType == $mediaType))[0].digest')
          cosign sign --yes --key env://COSIGN_PRIVATE_KEY ghcr.io/aruiz14/top-tcp-avg@${digest}
