name: top-tcp
description: Periodically report TCP send and receive activity by connection
datasources:
  tcp:
    annotations:
      cli.clear-screen-before: "true"
    fields:
      sent_raw:
        annotations:
          description: Sent bytes
      received_raw:
        annotations:
          description: Received bytes
      src:
        annotations:
          template: l4endpoint
      dst:
        annotations:
          template: l4endpoint
params:
  ebpf:
    target_family:
      key: family
      defaultValue: "-1"
      description: "Trace traffic from the specified IP family. Can be either 4 or 6. Specifying -1 means no filtering"
