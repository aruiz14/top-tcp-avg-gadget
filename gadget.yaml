name: top-tcp
description: Monitor TCP send and receive activity per connection
tracers:
  tcp:
    mapName: events
    structName: event
structs:
  event:
    fields:
    - name: timestamp
      description: Timestamp of the event
      attributes:
        template: timestamp
    - name: pid
      description: Process ID
      attributes:
        template: pid
    - name: comm
      description: Process name
      attributes:
        template: comm
    - name: mntns_id
      description: Mount namespace ID
      attributes:
        template: ns
    - name: src
      description: Source endpoint
      attributes:
        template: l4endpoint
    - name: dst
      description: Destination endpoint
      attributes:
        template: l4endpoint
    - name: bytes
      description: Number of bytes sent or received
    - name: direction
      description: Direction of the TCP operation (send or receive)
